<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Chess Board Updates</title>
    <script type="module" src="https://unpkg.com/chessboard-element?module"></script>
    <style>
        * {
            box-sizing: border-box;
        }
        
        body {
            font-family: Arial, sans-serif;
            display: flex;
            justify-content: center;
            align-items: center;
            min-height: 100vh;
            margin: 0;
            background-color: rgb(46, 15, 15);
            color: white;
            padding: 10px;
        }
        
        #app {
            background-color: rgb(31, 5, 5);
            color: white;
            max-width: 600px;
            width: 100%;
            padding: 20px;
            border-radius: 8px;
            box-shadow: 0 0 10px rgba(0,0,0,0.1);
        }
        
        chess-board {
            display: block;
            width: 100%;
            aspect-ratio: 1;
            margin: 0 auto 20px;
        }
        
        h1, h3, p {
            text-align: left;
            margin: 10px 0;
        }
        
        #evalGraph {
            display: block;
            width: 100%;
            max-width: 400px;
            margin: 20px auto;
            background: #222;
            border-radius: 8px;
        }
        
        @media (max-width: 600px) {
            #app {
                padding: 15px;
            }
            
            h1 {
                font-size: 1.5em;
            }
        }
    </style>
</head>
<body>
    <div id="app">
        <h1>Chess fr</h1>
        <chess-board></chess-board>
        <p>Position: <span id="fen"></span></p>
        <p>Eval: <span id="evalSource1"></span></p>
        <p>Material Eval: <span id="evalSource2"></span></p>
        <div style="margin-top: 15px;">
            <h3>Recent Eval + Material Graph</h3>
            <canvas id="evalGraph"></canvas>
        </div>
    </div>
    <script src="/socket.io/socket.io.js"></script>
    <script src="app.js"></script>
</body>
</html>
